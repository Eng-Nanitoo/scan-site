version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scansite
      POSTGRES_PASSWORD: scansite123
      POSTGRES_DB: scansite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scansite"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "4001:4000"
    environment:
      DATABASE_URL: postgresql://scansite:scansite123@db:5432/scansite
      JWT_SECRET: graduation-party-secret-key-change-in-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      PORT: 4000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
